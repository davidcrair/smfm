# @package _global_
# Linear-trainer power-law spectral OT cost sweep on the OTP-FM-style EB
# pipeline (TrajectoryNet's eb_velocity_v5 npz, top-100 PCs, StandardScaler,
# OTP-FM holdout pattern: stages 1 and 3 held out for evaluation).
#
# Data already lives in raw 100-PC space, so the trainer / spectral cost
# operate in flat R^100 with squared-Euclidean and 1/lambda^alpha kNN-Laplacian
# costs respectively. Sphere methods don't apply; train.py rejects them at
# startup when data.representation='euclidean_raw'.
methods:
  - MM+Linear                                     # Euclidean OT baseline
  - MM+Linear+Random                              # random-pairing baseline
  - MM+Linear+SquaredSpectral@alpha=0
  - MM+Linear+SquaredSpectral@alpha=0.5
  - MM+Linear+SquaredSpectral@alpha=1
  - MM+Linear+SquaredSpectral@alpha=1.5
  - MM+Linear+SquaredSpectral@alpha=2
eval:
  n_seeds: 1
